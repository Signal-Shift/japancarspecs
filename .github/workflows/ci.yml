name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Prisma migrate (SQLite CI DB)
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: "file:./ci.db"

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: "file:./ci.db"
          AUTH_SECRET: "ci-build-auth-secret-32chars-minimum"
